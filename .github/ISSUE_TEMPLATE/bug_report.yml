name: Bug report
description: Report a reproducible WatchMyAI defect
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, private infrastructure, or raw operational telemetry.
        Report security vulnerabilities using the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: WatchMyAI version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Ubuntu
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include relevant exit codes and redacted logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, personal data, private hostnames, and private addresses.
          required: true
        - label: I confirmed this is not a security vulnerability.
          required: true
