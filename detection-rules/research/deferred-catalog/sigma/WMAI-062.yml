title: Package installation anomaly
id: 357220e5-fde1-5460-a413-6d491c5bb16f
status: experimental
description: Detects common package-manager installation commands launched directly
  by a supported CLI AI agent.
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-062
- https://www.elastic.co/docs/reference/ecs
author: WatchMyAI contributors
date: '2026-07-16'
modified: '2026-07-16'
license: Apache-2.0
logsource:
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
    - /aider
    - \aider.exe
    - /claude
    - \claude.exe
    - /codex
    - \codex.exe
    - /copilot
    - \copilot.exe
    - /gemini
    - \gemini.exe
  selection_manager:
    Image|endswith:
    - /apt
    - /apt-get
    - /brew
    - /dnf
    - /npm
    - /pip
    - /pip3
    - /pnpm
    - /yarn
    - /yum
    - \choco.exe
    - \npm.cmd
    - \winget.exe
  selection_install:
    CommandLine|contains:
    - ' add '
    - ' i '
    - ' install '
  condition: selection_parent and selection_manager and selection_install
falsepositives:
- Approved maintenance or controlled laboratory activity can resemble package installation
  anomaly.
level: high
x_watchmyai_rule_id: WMAI-062
