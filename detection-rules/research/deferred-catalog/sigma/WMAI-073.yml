title: Secrets discovery activity
id: 33750cf2-f6fb-519a-8500-4485fc039825
status: experimental
description: Detects selected secret-discovery search patterns started by a supported
  CLI AI parent.
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-073
- https://www.elastic.co/docs/reference/ecs
author: WatchMyAI contributors
date: '2026-07-16'
modified: '2026-07-16'
license: Apache-2.0
logsource:
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
    - /aider
    - \aider.exe
    - /claude
    - \claude.exe
    - /codex
    - \codex.exe
    - /copilot
    - \copilot.exe
    - /gemini
    - \gemini.exe
  selection_image:
    Image|endswith:
    - /grep
    - /rg
    - /find
    - \findstr.exe
    - \powershell.exe
    - \pwsh.exe
  selection_terms:
    CommandLine|contains:
    - password
    - secret
    - token
    - api_key
    - .env
    - .ssh/id_
  condition: selection_parent and selection_image and selection_terms
falsepositives:
- Approved maintenance or controlled laboratory activity can resemble secrets discovery
  activity.
level: medium
x_watchmyai_rule_id: WMAI-073
