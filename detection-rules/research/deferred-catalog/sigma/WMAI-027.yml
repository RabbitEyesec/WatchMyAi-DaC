title: Scheduled Task Creation
id: c58e37dc-5f17-564b-a50b-e5bf0105f697
status: experimental
description: Detects command-line creation of a Windows scheduled task.
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-027
- https://www.elastic.co/docs/reference/ecs
author: WatchMyAI contributors
date: '2026-07-16'
modified: '2026-07-16'
license: Apache-2.0
logsource:
  category: process_creation
detection:
  selection_schtasks:
    Image|endswith:
    - \schtasks.exe
    CommandLine|contains:
    - ' /create '
  selection_powershell:
    Image|endswith:
    - \powershell.exe
    - \pwsh.exe
    CommandLine|contains:
    - Register-ScheduledTask
  condition: selection_schtasks or selection_powershell
falsepositives:
- Approved maintenance or controlled laboratory activity can resemble scheduled task
  creation.
level: medium
x_watchmyai_rule_id: WMAI-027
