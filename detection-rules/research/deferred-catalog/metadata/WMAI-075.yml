rule_id: WMAI-075
name: High-risk multi-stage execution chain
description: Correlates secret discovery, archive creation and transfer tooling under one parent process
  within ten minutes.
category: CLI Agent
maturity: validated
version: 1.0.0
author: WatchMyAI contributors
severity: critical
risk_score: 91
confidence: medium
threat_scenario: During an AI-assisted task, endpoint telemetry records high-risk multi-stage execution
  chain, creating potential risk to the affected host or resource.
target_agents:
- Claude Code
- Codex CLI
- Gemini CLI
- Cursor Agent
- Cline
- Roo Code
- Aider
- GitHub Copilot CLI
- Other CLI agents (telemetry dependent)
required_telemetry:
- Elastic Agent, Sysmon, Windows Security logs, shell history where available, process creation, network
  events, Git events, approval logs and AI session metadata
required_fields:
- '@timestamp'
- event.category
- event.type
- process.name
- process.parent.entity_id
data_sources:
- Elastic Defend
- Sysmon
- ECS process events
custom_telemetry: false
endpoint_only: true
correlation: true
detection_logic:
  kind: eql
  query: "sequence by process.parent.entity_id with maxspan=10m\n  [process where event.type == \"start\"\
    \ and process.name in (\"grep\", \"rg\", \"cat\")]\n  [process where event.type == \"start\" and process.name\
    \ in (\"tar\", \"zip\", \"7z\")]\n  [process where event.type == \"start\" and process.name in (\"\
    curl\", \"scp\", \"sftp\")]"
  sequence:
    join_by: process.parent.entity_id
    maxspan_seconds: 600
    stages:
    - event.category:process and event.type:start and process.name:(grep or rg or cat)
    - event.category:process and event.type:start and process.name:(tar or zip or 7z)
    - event.category:process and event.type:start and process.name:(curl or scp or sftp)
elastic:
  type: eql
  language: eql
  query: "sequence by process.parent.entity_id with maxspan=10m\n  [process where event.type == \"start\"\
    \ and process.name in (\"grep\", \"rg\", \"cat\")]\n  [process where event.type == \"start\" and process.name\
    \ in (\"tar\", \"zip\", \"7z\")]\n  [process where event.type == \"start\" and process.name in (\"\
    curl\", \"scp\", \"sftp\")]"
  index_patterns:
  - logs-endpoint.events.process-*
  - logs-windows.sysmon_operational-*
  - winlogbeat-*
  interval: 5m
  from: now-6m
  enabled: false
  target_stack_versions:
  - 8.17+
  - 9.x
  lab_tested_versions: []
sigma:
  status: not_applicable
  path: null
  reason: The detection requires a threshold or ordered multi-event correlation that a portable event-level
    Sigma rule would not preserve.
false_positives:
- Approved maintenance or controlled laboratory activity can resemble high-risk multi-stage execution
  chain.
tuning_guidance: Baseline high-risk multi-stage execution chain in the isolated lab, then tune only the
  documented paths, executables, thresholds, join fields, or approved workflows without removing evidence
  fields.
investigation_steps:
- Confirm the originating AI task, human owner and relevant policy version.
- Inspect the source event, process ancestry and affected resource evidence.
- Validate approvals and determine whether the observed action was authorized.
- Preserve timestamps and stable correlation identifiers before containment.
limitations:
- This endpoint sequence is a high-risk heuristic and does not prove data content or authorization.
- Synthetic fixture success is not a substitute for a live Elastic import and real-agent replay.
- Endpoint telemetry identifies observable behavior but does not prove AI intent, approval, or task scope.
validation_scenario: Replay a synthetic high-risk multi-stage execution chain event and a challenging
  benign event; then repeat with the target agent in the controlled lab.
expected_alert: One critical-severity alert for High-risk multi-stage execution chain, preserving the
  fields declared by this rule.
fixtures:
  malicious: tests/fixtures/malicious/WMAI-075.json
  benign: tests/fixtures/benign/WMAI-075.json
related_rules:
- WMAI-047
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-075
- https://www.elastic.co/docs/reference/ecs
threat_mappings: []
deployment:
  packageable: true
  status: lab_candidate
blocked_reason: null
history:
- version: 1.0.0
  date: '2026-07-16'
  author: WatchMyAI contributors
  change: Initial accountable definition for controlled laboratory validation.
