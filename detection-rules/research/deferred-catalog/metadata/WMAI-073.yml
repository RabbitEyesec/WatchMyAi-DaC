rule_id: WMAI-073
name: Secrets discovery activity
description: Detects selected secret-discovery search patterns started by a supported CLI AI parent.
category: CLI Agent
maturity: validated
version: 1.0.0
author: WatchMyAI contributors
severity: medium
risk_score: 47
confidence: medium
threat_scenario: During an AI-assisted task, endpoint telemetry records secrets discovery activity, creating
  potential risk to the affected host or resource.
target_agents:
- Claude Code
- Codex CLI
- Gemini CLI
- Cursor Agent
- Cline
- Roo Code
- Aider
- GitHub Copilot CLI
- Other CLI agents (telemetry dependent)
required_telemetry:
- Elastic Agent, Sysmon, Windows Security logs, shell history where available, process creation, network
  events, Git events, approval logs and AI session metadata
required_fields:
- event.category
- event.type
- process.name
- process.command_line
- process.parent.name
data_sources:
- Elastic Defend
- Sysmon
- ECS process events
custom_telemetry: false
endpoint_only: true
correlation: false
detection_logic:
  kind: query
  query: event.category:process and event.type:start and process.parent.name:(aider or aider.exe or claude
    or claude.exe or codex or codex.exe or copilot or copilot.exe or gemini or gemini.exe) and process.name:(grep
    or rg or find or findstr.exe or powershell.exe or pwsh.exe) and process.command_line:("*password*"
    or "*secret*" or "*token*" or "*api_key*" or "*.env*" or "*.ssh/id_*")
elastic:
  type: query
  language: kuery
  query: event.category:process and event.type:start and process.parent.name:(aider or aider.exe or claude
    or claude.exe or codex or codex.exe or copilot or copilot.exe or gemini or gemini.exe) and process.name:(grep
    or rg or find or findstr.exe or powershell.exe or pwsh.exe) and process.command_line:("*password*"
    or "*secret*" or "*token*" or "*api_key*" or "*.env*" or "*.ssh/id_*")
  index_patterns:
  - logs-endpoint.events.process-*
  - logs-windows.sysmon_operational-*
  - winlogbeat-*
  interval: 5m
  from: now-6m
  enabled: false
  target_stack_versions:
  - 8.17+
  - 9.x
  lab_tested_versions: []
sigma:
  status: implemented
  path: detections/sigma/WMAI-073.yml
  reason: null
false_positives:
- Approved maintenance or controlled laboratory activity can resemble secrets discovery activity.
tuning_guidance: Baseline secrets discovery activity in the isolated lab, then tune only the documented
  paths, executables, thresholds, join fields, or approved workflows without removing evidence fields.
investigation_steps:
- Confirm the originating AI task, human owner and relevant policy version.
- Inspect the source event, process ancestry and affected resource evidence.
- Validate approvals and determine whether the observed action was authorized.
- Preserve timestamps and stable correlation identifiers before containment.
limitations:
- Keyword searches are noisy and miss custom secret names or direct file API access.
- Synthetic fixture success is not a substitute for a live Elastic import and real-agent replay.
- Endpoint telemetry identifies observable behavior but does not prove AI intent, approval, or task scope.
validation_scenario: Replay a synthetic secrets discovery activity event and a challenging benign event;
  then repeat with the target agent in the controlled lab.
expected_alert: One medium-severity alert for Secrets discovery activity, preserving the fields declared
  by this rule.
fixtures:
  malicious: tests/fixtures/malicious/WMAI-073.json
  benign: tests/fixtures/benign/WMAI-073.json
related_rules:
- WMAI-054
- WMAI-057
- WMAI-058
- WMAI-059
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-073
- https://www.elastic.co/docs/reference/ecs
threat_mappings: []
deployment:
  packageable: true
  status: lab_candidate
blocked_reason: null
history:
- version: 1.0.0
  date: '2026-07-16'
  author: WatchMyAI contributors
  change: Initial accountable definition for controlled laboratory validation.
