rule_id: WMAI-052
name: Dangerous command sequence
description: Correlates discovery, transfer-tool and shell execution launched by one parent process within
  five minutes.
category: CLI Agent
maturity: validated
version: 1.0.0
author: WatchMyAI contributors
severity: medium
risk_score: 47
confidence: medium
threat_scenario: During an AI-assisted task, endpoint telemetry records dangerous command sequence, creating
  potential risk to the affected host or resource.
target_agents:
- Claude Code
- Codex CLI
- Gemini CLI
- Cursor Agent
- Cline
- Roo Code
- Aider
- GitHub Copilot CLI
- Other CLI agents (telemetry dependent)
required_telemetry:
- Elastic Agent, Sysmon, Windows Security logs, shell history where available, process creation, network
  events, Git events, approval logs and AI session metadata
required_fields:
- '@timestamp'
- event.category
- event.type
- process.name
- process.parent.entity_id
data_sources:
- Elastic Defend
- Sysmon
- ECS process events
custom_telemetry: false
endpoint_only: true
correlation: true
detection_logic:
  kind: eql
  query: "sequence by process.parent.entity_id with maxspan=5m\n  [process where event.type == \"start\"\
    \ and process.name in (\"whoami\", \"id\")]\n  [process where event.type == \"start\" and process.name\
    \ in (\"curl\", \"wget\")]\n  [process where event.type == \"start\" and process.name in (\"sh\",\
    \ \"bash\", \"powershell.exe\", \"pwsh.exe\")]"
  sequence:
    join_by: process.parent.entity_id
    maxspan_seconds: 300
    stages:
    - event.category:process and event.type:start and process.name:(whoami or id)
    - event.category:process and event.type:start and process.name:(curl or wget)
    - event.category:process and event.type:start and process.name:(sh or bash or powershell.exe or pwsh.exe)
elastic:
  type: eql
  language: eql
  query: "sequence by process.parent.entity_id with maxspan=5m\n  [process where event.type == \"start\"\
    \ and process.name in (\"whoami\", \"id\")]\n  [process where event.type == \"start\" and process.name\
    \ in (\"curl\", \"wget\")]\n  [process where event.type == \"start\" and process.name in (\"sh\",\
    \ \"bash\", \"powershell.exe\", \"pwsh.exe\")]"
  index_patterns:
  - logs-endpoint.events.process-*
  - logs-windows.sysmon_operational-*
  - winlogbeat-*
  interval: 5m
  from: now-6m
  enabled: false
  target_stack_versions:
  - 8.17+
  - 9.x
  lab_tested_versions: []
sigma:
  status: not_applicable
  path: null
  reason: The detection requires a threshold or ordered multi-event correlation that a portable event-level
    Sigma rule would not preserve.
false_positives:
- Approved maintenance or controlled laboratory activity can resemble dangerous command sequence.
tuning_guidance: Baseline dangerous command sequence in the isolated lab, then tune only the documented
  paths, executables, thresholds, join fields, or approved workflows without removing evidence fields.
investigation_steps:
- Confirm the originating AI task, human owner and relevant policy version.
- Inspect the source event, process ancestry and affected resource evidence.
- Validate approvals and determine whether the observed action was authorized.
- Preserve timestamps and stable correlation identifiers before containment.
limitations:
- The sequence is intentionally narrow and can match legitimate automation; it is not an intent verdict.
- Synthetic fixture success is not a substitute for a live Elastic import and real-agent replay.
- Endpoint telemetry identifies observable behavior but does not prove AI intent, approval, or task scope.
validation_scenario: Replay a synthetic dangerous command sequence event and a challenging benign event;
  then repeat with the target agent in the controlled lab.
expected_alert: One medium-severity alert for Dangerous command sequence, preserving the fields declared
  by this rule.
fixtures:
  malicious: tests/fixtures/malicious/WMAI-052.json
  benign: tests/fixtures/benign/WMAI-052.json
related_rules: []
references:
- docs/WatchMyAI_Detection_Engineering_Handbook.docx#WMAI-052
- https://www.elastic.co/docs/reference/ecs
threat_mappings: []
deployment:
  packageable: true
  status: lab_candidate
blocked_reason: null
history:
- version: 1.0.0
  date: '2026-07-16'
  author: WatchMyAI contributors
  change: Initial accountable definition for controlled laboratory validation.
