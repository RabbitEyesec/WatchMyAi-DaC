rule_id: WMAI-022
name: Sensitive File Read
description: Detects sensitive file read from underlying WatchMyAI request, decision, approval, resource,
  capability, and execution evidence without producer-declared findings.
category: Sensitive Data
maturity: testable
version: 2.0.0
author: WatchMyAI contributors
severity: high
risk_score: 73
confidence: high
test_tier: T3
guarantee: deterministic where a registered pre-tool adapter mediates the covered action; otherwise cooperative
  detection only
threat_scenario: An attributed AI-agent action produces underlying evidence consistent with sensitive
  file read and requires investigation or containment.
target_agents:
- Claude Code
- Codex CLI
- MCP clients through WatchMyAI gateway
required_telemetry:
- WatchMyAI Telemetry Schema 1.1.0
required_fields:
- event.action
- event.dataset
- process.command_line
- watchmyai.tool.arguments.command
- watchmyai.tool.arguments.file_path
data_sources:
- logs-watchmyai.events-*
custom_telemetry: true
endpoint_only: false
correlation: false
detection_logic:
  kind: query
  query: event.dataset:"watchmyai.events" and event.action:"tool_request" and (watchmyai.tool.arguments.command:(*id_rsa*
    or *id_ed25519* or *id_ecdsa* or *.pem or *.key or *.env or *credentials* or *Credentials* or *Certificates*
    or *cloud-token* or *service-account* or *secret* or *.aws* or *.ssh*) or watchmyai.tool.arguments.file_path:(*id_rsa*
    or *id_ed25519* or *.pem or *.key or *.env or *credentials* or *Credentials* or *.aws* or *.ssh*)
    or process.command_line:(*id_rsa* or *credentials* or *Credentials* or *.env or *.aws* or *.ssh*))
elastic:
  type: query
  language: kuery
  query: event.dataset:"watchmyai.events" and event.action:"tool_request" and (watchmyai.tool.arguments.command:(*id_rsa*
    or *id_ed25519* or *id_ecdsa* or *.pem or *.key or *.env or *credentials* or *Credentials* or *Certificates*
    or *cloud-token* or *service-account* or *secret* or *.aws* or *.ssh*) or watchmyai.tool.arguments.file_path:(*id_rsa*
    or *id_ed25519* or *.pem or *.key or *.env or *credentials* or *Credentials* or *.aws* or *.ssh*)
    or process.command_line:(*id_rsa* or *credentials* or *Credentials* or *.env or *.aws* or *.ssh*))
  index_patterns:
  - logs-watchmyai.events-*
  interval: 1m
  from: now-6m
  enabled: false
  target_stack_versions:
  - 9.4.3
  lab_tested_versions:
  - 9.4.3
sigma:
  status: not_applicable
  path: null
  reason: The rule depends on WatchMyAI policy and identity fields that have no portable Sigma logsource.
false_positives:
- An outdated allowlist, workspace root, adapter capability declaration, or operator-approved administrative
  workflow can resemble the condition.
tuning_guidance: Tune with explicit policy IDs, stable resource identities, and bounded maintenance windows;
  never suppress a DENY-followed-by-execution invariant.
investigation_steps:
- Verify event-chain continuity and adapter capability.
- Review request, decision, approval, and execution records sharing the action ID.
- Confirm the active signed policy bundle and resource classification.
- Contain the session when execution followed DENY or approval integrity failed.
response_playbook: playbooks/WMAI-022.md
limitations:
- Cooperative hooks do not provide kernel-level containment.
- Hosted or direct tool paths outside declared adapter coverage can require endpoint evidence.
- Retained isolated-lab alert evidence is documented separately; it proves observed alerts only, not efficacy,
  recall, false-positive rate, or future connected validation.
validation_scenario: Ingest the schema 1.1.0 malicious fixture for SCN-WMAI-022 and correlate the resulting
  alert to the fixture session and action IDs.
expected_alert: One deduplicated high alert for Sensitive File Read with action, session, policy, guarantee,
  and chain evidence.
fixtures:
  malicious: tests/fixtures/malicious/WMAI-022.json
  benign: tests/fixtures/benign/WMAI-022.json
test_artifacts:
  atomic: tests/corpus/atomic/WMAI-022.json
  evasion: tests/corpus/evasion/WMAI-022.json
  producer_conformance: tests/corpus/conformance/WMAI-022.json
traceability:
- ../deployment/rules_schema_1.1.0.ndjson
- ../docs/DETECTION_RULES.md
related_rules: []
references:
- ../telemetry-gateway/docs/TELEMETRY_SCHEMA.md
- ../telemetry-gateway/docs/ARCHITECTURE.md
threat_mappings: []
deployment:
  packageable: true
  status: production_validated
blocked_reason: null
history:
- version: 1.0.0
  date: '2026-07-18'
  author: WatchMyAI contributors
  change: Rebuilt from the approved production design baseline using underlying evidence.
- version: 1.1.0
  date: '2026-07-20'
  author: WatchMyAI release engineering
  change: Reconciled with the rule validated in the Elastic laboratory.
